services:
  monitor:
    build: .
    image: system-monitor:latest
    container_name: system-monitor
    restart: unless-stopped
    runtime: nvidia
    network_mode: host
    # Without a shared PID namespace NVML enumerates no GPU processes — the
    # familiar "no running processes found" from nvidia-smi inside Docker.
    pid: host
    environment:
      - PORT=${PORT:-8090}
      - INTERVAL_MS=1000
      - HISTORY_SECONDS=60
      - PROC_TOP_N=25
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ROOT=/host/root
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - type: bind
        source: /
        target: /host/root
        read_only: true
        bind:
          propagation: rslave
